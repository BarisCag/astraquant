[package]
name = "astra-core"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Deterministic event-sourced trading kernel (research prototype)"
readme = "../../README.md"
keywords = ["deterministic", "event-sourcing", "trading", "replay"]
categories = ["algorithms", "data-structures"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
bincode = { version = "2.0.0-rc.3", features = ["serde"] }
blake3 = "1.5"
hex = "0.4"
astra-risk = { path = "../astra-risk" }
astra-portfolio = { path = "../astra-portfolio" }

[dev-dependencies]
proptest = "1.11.0"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
