[package]
name = "astra-research"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "astra-research"
path = "src/main.rs"

[dependencies]
astra-core = { path = "../astra-core" }
astra-exchange = { path = "../astra-exchange" }
astra-scenarios = { path = "../astra-scenarios" }
astra-ops = { path = "../astra-ops" }
astra-agents = { path = "../astra-agents" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3.3"
blake3 = "1.5.0"

