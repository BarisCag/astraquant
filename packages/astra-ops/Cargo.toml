[package]
name = "astra-ops"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Deterministic operational control plane for AstraQuant"

[[bin]]
name = "astra-ops"
path = "src/main.rs"

[dependencies]
astra-core = { path = "../astra-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync"] }
bincode = "1.3.3"
blake3 = "1.4"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
