[package]
name = "astra-risk-node"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
blake3 = "1.3"

# Async & HTTP
tokio = { version = "1.0", features = ["full"] }
axum = "0.6"
prometheus = "0.13"

# Math & Deterministic RNG
rand = "0.8"
rand_chacha = "0.3"
rand_distr = "0.4"
rust_decimal = "1.30"
rust_decimal_macros = "1.30"
statrs = "0.16"
rayon = "1.7"

# Astra Dependencies
astra-core = { path = "../astra-core" }
astra-paper = { path = "../astra-paper" }
astra-treasury = { path = "../astra-treasury" }
astra-risk = { path = "../astra-risk" }
