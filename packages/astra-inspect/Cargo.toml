[package]
name = "astra-inspect"
version = "0.1.0"
edition = "2021"

[dependencies]
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
blake3 = "1.3"
clap = { version = "4.4", features = ["derive"] }

astra-core = { path = "../astra-core" }
