astra-stream = { path = "../astra-stream" }
astra-lob = { path = "../astra-lob" }
astra-risk = { path = "../astra-risk" }
astra-portfolio = { path = "../astra-portfolio" }
astra-strategy = { path = "../astra-strategy" }
astra-router = { path = "../astra-router" }
