[package]
name = "astra-exchange"
version = "0.1.0"
edition = "2021"

[dependencies]
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
blake3 = "1.3"
clap = { version = "4.4", features = ["derive"] }
astra-core = { path = "../astra-core" }
astra-stream = { path = "../astra-stream" }
astra-lob = { path = "../astra-lob" }
astra-risk = { path = "../astra-risk" }
astra-portfolio = { path = "../astra-portfolio" }
astra-strategy = { path = "../astra-strategy" }
astra-router = { path = "../astra-router" }
astra-clearing = { version = "0.1.0", path = "../astra-clearing" }
astra-ops = { path = "../astra-ops" }
astra-policy = { path = "../astra-policy" }
astra-agents = { version = "0.1.0", path = "../astra-agents" }

[dev-dependencies]
tempfile = "3"
